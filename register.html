<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員登録（無料）｜ TAmJ 地域インテリジェンス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
:root{--ink:#1b1a17;--ink-soft:#4a4640;--ink-faint:#8b857b;--paper:#fff;--paper-warm:#faf8f4;--rule:#ded7c9;--gold:#a4863f;--gold-deep:#856a2c;--gold-wash:#f5efe1;--serif-en:'Fraunces',serif;--serif-jp:'Zen Old Mincho',serif;--sans:'Zen Kaku Gothic New',sans-serif;--alert:#8a3b2f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper-warm);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;line-height:1.7}
.top{border-bottom:1px solid var(--rule);background:#fff;padding:14px clamp(16px,4vw,48px)}
.top a{font-family:var(--serif-jp);font-weight:700;font-size:1.1rem;text-decoration:none;color:var(--ink)}
.top a .en{font-family:var(--serif-en);font-style:italic;color:var(--gold-deep);font-size:.72rem;display:block}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
.box{background:#fff;border:1px solid var(--rule);border-radius:14px;max-width:420px;width:100%;padding:40px 36px;box-shadow:0 18px 50px rgba(27,26,23,.06)}
.box .eyebrow{font-family:var(--serif-en);font-style:italic;color:var(--gold-deep);font-size:.85rem;margin-bottom:8px}
.box h1{font-family:var(--serif-jp);font-size:1.5rem;margin-bottom:8px}
.box .sub{color:var(--ink-soft);font-size:.86rem;margin-bottom:24px}
label{display:block;font-size:.72rem;letter-spacing:.08em;color:var(--gold-deep);text-transform:uppercase;font-family:var(--serif-en);margin:14px 0 6px}
input{width:100%;padding:12px 13px;font-family:var(--sans);font-size:.95rem;border:1px solid var(--rule);border-radius:7px;background:#fff}
input:focus{outline:none;border-color:var(--gold)}
.cf-turnstile{margin:18px 0}
button{width:100%;margin-top:8px;padding:13px;font-family:var(--sans);font-weight:700;font-size:.95rem;background:var(--gold);color:#fff;border:none;border-radius:7px;cursor:pointer;transition:.2s;letter-spacing:.04em}
button:hover{background:var(--gold-deep)}
button:disabled{opacity:.6;cursor:default}
.msg{display:none;font-size:.84rem;margin-top:14px;color:var(--alert);line-height:1.7}
.msg.show{display:block}
.alt{text-align:center;margin-top:20px;font-size:.85rem;color:var(--ink-soft)}
.alt a{color:var(--gold-deep);text-decoration:none;font-weight:500}
.note{font-size:.72rem;color:var(--ink-faint);line-height:1.8;margin-top:18px;padding-top:16px;border-top:1px solid var(--rule)}
</style>
</head>
<body>
<div class="top"><a href="index.html">TAmJ 地域インテリジェンス<span class="en">Regional Intelligence</span></a></div>
<main>
  <div class="box">
    <div class="eyebrow">Free membership</div>
    <h1>会員登録（無料）</h1>
    <p class="sub mincho">登録すると、全国 市区町村単位の推計データ・推移グラフ・診療科目別の医療機関数まで、すべて無料でご利用いただけます。</p>
    <label>お名前（任意）</label>
    <input id="regName" type="text" autocomplete="name" placeholder="山田 太郎">
    <label>メールアドレス</label>
    <input id="regEmail" type="email" autocomplete="email" placeholder="you@example.com">
    <label>パスワード</label>
    <input id="regPassword" type="password" autocomplete="new-password" placeholder="8文字以上">
    <div id="turnstile-container" class="cf-turnstile" data-sitekey="0x4AAAAAACzYM9MQXQVBO1-o" data-theme="light"></div>
    <button id="btnRegister">会員登録（無料）</button>
    <div id="regError" class="msg"></div>
    <div class="alt">すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></div>
    <div class="note">本サービスの数値はTAmJの独自マクロ推計です。登録情報は会員認証にのみ使用します。</div>
  </div>
</main>
<script src="js/auth.js"></script>
<script>
onAuthReady(function(user){ if(user) location.href='index.html'; });
document.getElementById('btnRegister').addEventListener('click', async function(){
  var btn=document.getElementById('btnRegister'), err=document.getElementById('regError');
  var name=document.getElementById('regName').value.trim();
  var email=document.getElementById('regEmail').value.trim();
  var pw=document.getElementById('regPassword').value;
  err.classList.remove('show'); err.style.color='';
  if(!email||!pw){ err.textContent='メールアドレスとパスワードを入力してください。'; err.classList.add('show'); return; }
  var ti=document.querySelector('#turnstile-container [name="cf-turnstile-response"]');
  var token=ti?ti.value:'';
  if(!token){ err.textContent='ボット確認を完了してください。'; err.classList.add('show'); return; }
  btn.disabled=true; btn.textContent='登録中…';
  var r=await registerUser(email,pw,name,token);
  if(r.ok){ err.style.color='var(--gold-deep)'; err.textContent='確認メールを送信しました。メールをご確認ください。'; err.classList.add('show'); btn.textContent='送信完了'; }
  else{ err.textContent=r.error||'登録に失敗しました。'; err.classList.add('show'); btn.disabled=false; btn.textContent='会員登録（無料）'; if(typeof turnstile!=='undefined') turnstile.reset('#turnstile-container'); }
});
document.getElementById('regPassword').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('btnRegister').click(); });
</script>
</body>
</html>
