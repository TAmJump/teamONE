<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="資金の道筋が見える：資金→施設→使途→成果">
  <rect width="1000" height="300" fill="#ffffff"/>
  <g font-family="'Zen Kaku Gothic New',sans-serif">
    <!-- 4 steps -->
    <g>
      <rect x="30" y="90" width="200" height="120" rx="14" fill="#a4863f"/>
      <text x="130" y="140" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">あなたの資金</text>
      <text x="130" y="170" text-anchor="middle" fill="#ffffff" font-size="13" opacity=".85">いくら出したか</text>
    </g>
    <g>
      <rect x="270" y="90" width="200" height="120" rx="14" fill="#f0e7d3"/>
      <text x="370" y="140" text-anchor="middle" fill="#2b2621" font-size="18" font-weight="700">どの施設へ</text>
      <text x="370" y="170" text-anchor="middle" fill="#5a5147" font-size="13">行き先が分かる</text>
    </g>
    <g>
      <rect x="510" y="90" width="200" height="120" rx="14" fill="#f0e7d3"/>
      <text x="610" y="132" text-anchor="middle" fill="#2b2621" font-size="18" font-weight="700">何に使ったか</text>
      <text x="610" y="158" text-anchor="middle" fill="#5a5147" font-size="13">改修・採用・DX</text>
      <text x="610" y="178" text-anchor="middle" fill="#5a5147" font-size="13">物流</text>
    </g>
    <g>
      <rect x="750" y="90" width="220" height="120" rx="14" fill="#7d6329"/>
      <text x="860" y="132" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">どんな成果か</text>
      <text x="860" y="158" text-anchor="middle" fill="#ffffff" font-size="13" opacity=".9">稼働率・雇用</text>
      <text x="860" y="178" text-anchor="middle" fill="#ffffff" font-size="13" opacity=".9">利回り</text>
    </g>
    <!-- arrows -->
    <g stroke="#a4863f" stroke-width="5" stroke-linecap="round">
      <line x1="238" y1="150" x2="262" y2="150"/><line x1="478" y1="150" x2="502" y2="150"/><line x1="718" y1="150" x2="742" y2="150"/>
    </g>
    <text x="500" y="50" text-anchor="middle" fill="#2b2621" font-family="'Zen Old Mincho',serif" font-size="18" font-weight="700">お金の道筋が、最後まで見える</text>
  </g>
</svg>
