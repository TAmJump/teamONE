<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="内部留保を信用として使い、融資を地域インフラへ">
  <rect width="1000" height="300" fill="#ffffff"/>
  <g font-family="'Zen Kaku Gothic New',sans-serif">
    <rect x="30" y="95" width="210" height="120" rx="14" fill="#f0e7d3"/>
    <text x="135" y="135" text-anchor="middle" fill="#2b2621" font-size="16" font-weight="700">内部留保</text>
    <text x="135" y="172" text-anchor="middle" fill="#a4863f" font-family="Fraunces,serif" font-size="28">¥20億</text>
    <text x="135" y="195" text-anchor="middle" fill="#5a5147" font-size="12">連携20法人・そのまま</text>

    <rect x="290" y="95" width="200" height="120" rx="14" fill="#a4863f"/>
    <text x="390" y="140" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">信用として</text>
    <text x="390" y="168" text-anchor="middle" fill="#ffffff" font-size="13" opacity=".85">使わず担保に</text>

    <rect x="540" y="95" width="210" height="120" rx="14" fill="#7d6329"/>
    <text x="645" y="135" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">銀行融資</text>
    <text x="645" y="172" text-anchor="middle" fill="#ffffff" font-family="Fraunces,serif" font-size="26">¥100〜300億</text>

    <rect x="800" y="95" width="170" height="120" rx="14" fill="#f0e7d3"/>
    <text x="885" y="140" text-anchor="middle" fill="#2b2621" font-size="16" font-weight="700">地域インフラ</text>
    <text x="885" y="168" text-anchor="middle" fill="#5a5147" font-size="12">施設・物流・DX</text>

    <g stroke="#a4863f" stroke-width="5" stroke-linecap="round">
      <line x1="248" y1="155" x2="282" y2="155"/><line x1="498" y1="155" x2="532" y2="155"/><line x1="758" y1="155" x2="792" y2="155"/>
    </g>
    <text x="500" y="55" text-anchor="middle" fill="#2b2621" font-family="'Zen Old Mincho',serif" font-size="18" font-weight="700">内部留保は「使う」のではなく「効かせる」</text>
    <text x="500" y="255" text-anchor="middle" fill="#5a5147" font-size="12">現場の資金は公益目的のまま動かさない（制度上の可否は個別に要確認）</text>
  </g>
</svg>
