  <g fill="none" stroke="#9db69a" stroke-width="2.6" stroke-linecap="round">
    <path d="M400 250 Q250 180 150 130"/>
    <path d="M400 250 Q300 300 170 350"/>
    <path d="M400 250 Q520 160 640 120"/>
