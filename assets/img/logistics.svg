    <rect x="140" y="325" width="46" height="46" rx="8"/>
    <rect x="618" y="95" width="46" height="46" rx="8"/>
    <rect x="636" y="336" width="46" height="46" rx="8"/>
    <rect x="377" y="408" width="46" height="46" rx="8"/>
